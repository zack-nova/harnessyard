version: "2"

run:
  timeout: 10m
  relative-path-mode: gomod
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exptostd
    - fatcontext
    - gocheckcompilerdirectives
    - gomoddirectives
    - gosec
    - govet
    - ineffassign
    - makezero
    - mirror
    - misspell
    - nilerr
    - nilnesserr
    - nilnil
    - nolintlint
    - revive
    - staticcheck
    - testifylint
    - unparam
    - unused
    - usestdlibvars
    - whitespace
    - wrapcheck
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - os.Remove
        - os.RemoveAll
        - (*os.File).Close
        - (*gopkg.in/yaml.v3.Encoder).Close
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    nolintlint:
      require-explanation: true
      require-specific: true
    unparam:
      check-exported: false
    wrapcheck:
      report-internal-errors: false
  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - comments
    rules:
      - path: _test\.go
        linters:
          - gosec
          - wrapcheck
